name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skills:
    name: Validate skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      # Pure-Node validator — no npm install needed, so this is fast
      # and catches broken frontmatter / cross-references / forbidden
      # skill names before any agent ever loads a malformed skill.
      - run: node scripts/validate-skills.mjs
