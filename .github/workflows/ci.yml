name: skill-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: thedaviddias/skill-check@v1
        with:
          path: skills
          format: github
        # By default skill-check exits non-zero only on errors.
        # Warnings surface as ::warning annotations on the PR diff
        # (format=github) but don't fail the build — fail-on-warning
        # is intentionally NOT set. See AGENTS.md.