name: skill-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Uses thedaviddias/skill-check GitHub Action at the pinned
    # v1.2.0 tag (NOT @v1 — no floating v1 tag exists on the repo
    # yet, the Marketplace isn't published). The action.yml lives
    # at the repo root, so the reference resolves cleanly.
    #
    # The action's `format:` input only accepts text|json|sarif —
    # `format: github` is a CLI-only flag, not an action input.
    # We use the default `text` output (logged to the run) and
    # accept the lack of inline PR annotations. If we want them
    # later, switch to `format: sarif` + `github/codeql-action/upload-sarif`.
    #
    # fail-on-warning → default false: warnings are quality signals
    # (description.use_when_phrase, metadata array-as-string), not
    # blockers for the skill loader.
    #
    # actions/setup-node is required: the GitHub Actions Node 20
    # default runtime is being deprecated (see the runner warning),
    # and the skill-check action installs npm packages on demand.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: thedaviddias/skill-check@v1.2.0
        with:
          path: skills