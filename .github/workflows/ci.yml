name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-skills:
    name: Validate skills
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      # Pure-Node validator — uses only built-in modules (fs, path, url)
      # so no Node setup or package install needed. The runner ships
      # with Node 20+ by default. Catches broken frontmatter /
      # cross-references / forbidden skill names before any agent ever
      # loads a malformed skill.
      - run: node scripts/validate-skills.mjs
